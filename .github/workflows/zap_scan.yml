name: OWASP ZAP Security Scan (Full Pentest)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Quet bao mat Web (Full Scan)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Chuan bi file bao cao
        run: |
          touch report.html
          chmod 777 report.html

      - name: Chay ZAP FULL SCAN (Docker)
        # Tăng timeout cho job này lên vì Full Scan chạy rất lâu
        timeout-minutes: 40 
        run: |
          # Dùng zap-full-scan.py thay vì zap-baseline.py để quét sâu
          docker run --rm -v $(pwd):/zap/wrk/:rw -u 0 -t zaproxy/zap-stable zap-full-scan.py \
            -t https://demo.owasp-juice.shop/ \
            -r report.html || true

      - name: Kiem tra va Luu bao cao
        if: always()
        run: |
          mkdir -p 02_Ket_qua_quet
          if [ -s report.html ]; then
            cp report.html 02_Ket_qua_quet/full_report_$(date +'%H%M').html
            echo "--- ĐÃ CÓ BÁO CÁO FULL SCAN ---"
          fi

      - name: Tu dong day len Github
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Upgrade: Full Security Scan Report #${{ github.run_number }}"
          file_pattern: '02_Ket_qua_quet/*.html'