name: DevSecOps Kill-Switch Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Quét mã nguồn (Tạm tắt Snyk nếu Repo chưa có code Node.js/Python để tránh lỗi)
      # Nếu ông muốn dùng Snyk, hãy đảm bảo có file package.json ở root nhé.

      # 2. Quét Website (DAST)
      - name: Chuan bi file bao cao
        run: |
          touch report.html
          chmod 777 report.html

      - name: Chay ZAP FULL SCAN (Docker)
        run: |
          docker run --rm -v $(pwd):/zap/wrk/:rw -u 0 -t zaproxy/zap-stable zap-full-scan.py \
            -t https://demo.owasp-juice.shop/ \
            -r report.html || true

      # 3. LOGIC KILL-SWITCH (Đã gia cố để không bị exit code 1)
      - name: Kich hoat phan ung tu dong
        if: always()
        run: |
          # Mặc định lấy trang an toàn làm trang chủ
          if [ -f normal.html ]; then
            cp normal.html index.html
          else
            echo "<h1>System Running</h1>" > index.html
          fi
          
          # Kiểm tra file report.html có tồn tại và có chữ "High" không
          if [ -f report.html ] && grep -q "High" report.html; then
            echo "--- PHÁT HIỆN LỖI HIGH! KÍCH HOẠT KILL SWITCH ---"
            if [ -f attack.html ]; then
              cp attack.html index.html
            else
              echo "<h1>SYSTEM UNDER ATTACK</h1>" > index.html
            fi
          fi

      # 4. Đẩy kết quả lên GitHub (Thêm dấu || true để không bị lỗi nếu không có gì thay đổi)
      - name: Tu dong day len Github
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "DevSecOps: Auto-response and Report update"
          file_pattern: 'index.html 02_Ket_qua_quet/*.html report.html'
          push_options: '--force'