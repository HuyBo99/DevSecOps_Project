name: OWASP ZAP Security Scan

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Quét lỗ hổng bảo mật Web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          # Đổi sang link demo này cho ổn định nha Huy
          target: 'https://demo.owasp-juice.shop/'
          fail_action: false
          cmd_options: '-r report.html'

      - name: Di chuyển báo cáo vào thư mục
        if: always() # Luôn chạy bước này kể cả bước trên có lỗi
        run: |
          mkdir -p 02_Ket_qua_quet
          # Dùng -f để nó không báo lỗi nếu không tìm thấy file
          cp -f report.html 02_Ket_qua_quet/report_$(date +'%Y%m%d_%H%M').html || echo "Chưa có file để copy"
          ls -l 02_Ket_qua_quet/

      - name: Auto Commit and Push
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Báo cáo bảo mật ${{ github.run_id }}"
          file_pattern: '02_Ket_qua_quet/*.html'
          skip_dirty_check: true # Ép nó chạy kể cả khi không có thay đổi lớn