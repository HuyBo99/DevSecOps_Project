name: OWASP ZAP Security Scan

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Quét lỗ hổng bảo mật Web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true # Giữ lại quyền đăng nhập để push

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://juice-shop.herokuapp.com/'
          artifact_name: 'zap_report'
          fail_action: false

      - name: Lưu báo cáo vào thư mục kết quả
        if: always()
        run: |
          mkdir -p 02_Ket_qua_quet
          if [ -f "zap_report.html" ]; then
            cp zap_report.html 02_Ket_qua_quet/report_$(date +'%Y%m%d_%H%M').html
          fi

      - name: Đẩy báo cáo lên GitHub
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add 02_Ket_qua_quet/*.html
          # Chỉ commit nếu có file mới, tránh lỗi khi không có gì thay đổi
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Báo cáo bảo mật $(date +'%d-%m-%Y')" && git push)