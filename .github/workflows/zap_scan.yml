name: DevSecOps Final Kill-Switch Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Quyền hạn cực kỳ quan trọng để không bị lỗi 400
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  security_scan_and_deploy:
    # Chỉ định môi trường để GitHub biết chỗ đẩy Web lên
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. SAST: Quét mã nguồn với Snyk (Dùng continue-on-error để không bị dừng Pipeline)
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 2. DAST: Quét Web với ZAP Full Scan
      - name: Chuan bi file bao cao
        run: |
          touch report.html
          chmod 777 report.html

      - name: Chay ZAP FULL SCAN (Docker)
        run: |
          docker run --rm -v $(pwd):/zap/wrk/:rw -u 0 -t zaproxy/zap-stable zap-full-scan.py \
            -t https://demo.owasp-juice.shop/ \
            -r report.html || true

      # 3. LOGIC KILL-SWITCH: Quyết định bộ mặt của Website
      - name: Create index.html based on security status
        run: |
          # Kiểm tra file báo cáo có tồn tại và có chữ "High" không
          if [ -f report.html ] && grep -i -q "High" report.html; then
            echo "PHAT HIEN LOI HIGH - KICH HOAT KILL SWITCH"
            # Ưu tiên dùng file attack.html của Huy, nếu không có thì tự tạo code xịn
            if [ -f attack.html ]; then
              cat attack.html > index.html
            else
              echo "<html><body style='background:black;color:red;text-align:center;padding-top:15%;font-family:monospace;'><h1>[ SYSTEM UNDER ATTACK ]</h1><p>High Vulnerabilities Detected by Huy's Pipeline</p></body></html>" > index.html
            fi
          else
            echo "He thong an toan - Duy tri trang thai binh thuong"
            if [ -f normal.html ]; then
              cat normal.html > index.html
            else
              echo "<html><body style='text-align:center;padding-top:20%;font-family:sans-serif;'><h1>System Running Safely</h1><p>Powered by DevSecOps Pipeline</p></body></html>" > index.html
            fi
          fi
          # Tạo file .nojekyll để chắc chắn hiển thị HTML
          touch .nojekyll

      # 4. TRIỂN KHAI THẲNG LÊN GITHUB PAGES
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Đẩy toàn bộ thư mục hiện tại lên
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4