name: OWASP ZAP Security Scan

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Quét lỗ hổng bảo mật Web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://juice-shop.herokuapp.com/'
          fail_action: false
          # Ép ZAP phải tạo ra file tên là report.html
          cmd_options: '-r report.html'

      - name: Di chuyển báo cáo vào thư mục
        if: always()
        run: |
          mkdir -p 02_Ket_qua_quet
          # Copy bất kỳ file html nào tìm thấy vào thư mục kết quả
          cp *.html 02_Ket_qua_quet/report_$(date +'%Y%m%d_%H%M').html || echo "Không tìm thấy file"
          ls -l 02_Ket_qua_quet/

      - name: Auto Commit and Push
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Báo cáo bảo mật ${{ github.run_id }}"
          file_pattern: '02_Ket_qua_quet/*.html'