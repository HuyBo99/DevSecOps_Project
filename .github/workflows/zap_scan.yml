name: OWASP ZAP Security Scan

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Quet bao mat Web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # DÙNG DOCKER TRỰC TIẾP - ĐÂY LÀ CÁCH DỨT ĐIỂM LỖI ARTIFACT
      - name: Chạy ZAP Scan bằng Docker
        run: |
          docker run --rm -v $(pwd):/zap/wrk/:rw -t zaproxy/zap-stable zap-baseline.py \
            -t https://demo.owasp-juice.shop/ \
            -r report.html || true

      - name: Luu bao cao vao thu muc 02
        if: always()
        run: |
          mkdir -p 02_Ket_qua_quet
          # Kéo file report.html từ Docker ra thư mục của Huy
          [ -f report.html ] && cp report.html 02_Ket_qua_quet/report_$(date +'%H%M').html || echo "No report"
          
      - name: Tu dong day len Github
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Success: Báo cáo bảo mật ${{ github.run_number }}"
          file_pattern: '02_Ket_qua_quet/*.html'