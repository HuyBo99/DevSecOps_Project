name: Super DevSecOps Pipeline (SAST & DAST)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- PHẦN 1: SAST (Quét mã nguồn với Snyk) ---
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true # Để Pipeline vẫn chạy tiếp DAST kể cả khi code có lỗi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=low

      # --- PHẦN 2: DAST (Quét Web đang chạy với ZAP) ---
      - name: Chuan bi file bao cao DAST
        run: |
          touch report.html
          chmod 777 report.html

      - name: Chay ZAP FULL SCAN (Docker)
        timeout-minutes: 40 
        run: |
          docker run --rm -v $(pwd):/zap/wrk/:rw -u 0 -t zaproxy/zap-stable zap-full-scan.py \
            -t https://demo.owasp-juice.shop/ \
            -r report.html || true

      - name: Luu ket qua vao thu muc 02
        if: always()
        run: |
          mkdir -p 02_Ket_qua_quet
          [ -s report.html ] && cp report.html 02_Ket_qua_quet/full_report_$(date +'%H%M').html || echo "No DAST report"
          
      - name: Tu dong day tat ca len Github
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "DevSecOps Upgrade: SAST with Snyk and DAST with ZAP"
          file_pattern: '02_Ket_qua_quet/*.html'