name: OWASP ZAP Security Scan

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions: # Cấp quyền ghi vào Repo ngay trong code
  contents: write

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Quét lỗ hổng bảo mật Web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://juice-shop.herokuapp.com/'
          artifact_name: 'zap_report'
          fail_action: false # Không cho Pipeline dừng lại khi thấy lỗi bảo mật

      - name: Upload Scan Report to Repo
        if: always()
        run: |
          mkdir -p 02_Ket_qua_quet
          # Kiểm tra nếu file tồn tại mới copy để tránh lỗi
          if [ -f "zap_report.html" ]; then
            cp zap_report.html 02_Ket_qua_quet/report_$(date +'%Y%m%d').html
          fi
          
      - name: Commit and Push report
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add 02_Ket_qua_quet/*.html
          git commit -m "Auto-update: Kết quả quét bảo mật $(date +'%Y-%m-%d')" || exit 0
          git push