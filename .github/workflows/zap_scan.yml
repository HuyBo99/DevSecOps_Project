name: "Final: Siêu Pipeline DevSecOps Kill-Switch"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  security_scan_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. SAST: Quét mã nguồn với Snyk (Nếu lỗi cũng không dừng Pipeline)
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 2. DAST: Quét Web với ZAP Full Scan (Quét cực kỹ)
      - name: Chuan bi file bao cao
        run: |
          touch report.html
          chmod 777 report.html

      - name: Chay ZAP FULL SCAN
        run: |
          docker run --rm -v $(pwd):/zap/wrk/:rw -u 0 -t zaproxy/zap-stable zap-full-scan.py \
            -t https://demo.owasp-juice.shop/ \
            -r report.html || true

      # 3. LOGIC KILL-SWITCH: Tự động quyết định bộ mặt của Website
      - name: Create index.html based on security status
        run: |
          # Kiểm tra file báo cáo có tồn tại và có chữ "High" HOẶC "Medium" không
          if [ -f report.html ] && (grep -Ei "High|Medium" report.html); then
            echo "⚠️ PHAT HIEN LOI NGUY HIEM (HIGH/MEDIUM) - KICH HOAT KILL SWITCH ⚠️"
            # Ưu tiên dùng file attack.html của Huy
            if [ -f attack.html ]; then
              cp attack.html index.html
            else
              echo "<html><body style='background:black;color:red;text-align:center;'><h1>SYSTEM LOCKED BY SECURITY</h1></body></html>" > index.html
            fi
          else
            echo "✅ He thong an toan - Duy tri trang thai binh thuong"
            if [ -f normal.html ]; then
              cp normal.html index.html
            else
              echo "<html><body><h1>Huy's Secure Website</h1></body></html>" > index.html
            fi
          fi
          # Tạo file .nojekyll để GitHub Pages hiển thị đúng HTML
          touch .nojekyll

      # 4. TRIỂN KHAI LÊN GITHUB PAGES
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Đẩy toàn bộ thư mục hiện tại lên
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4