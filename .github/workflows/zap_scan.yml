name: DevSecOps Kill-Switch Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Quét mã nguồn (Tạm tắt Snyk nếu Repo chưa có code Node.js/Python để tránh lỗi)
      # Nếu ông muốn dùng Snyk, hãy đảm bảo có file package.json ở root nhé.

      # 2. Quét Website (DAST)
      - name: Chuan bi file bao cao
        run: |
          touch report.html
          chmod 777 report.html

      - name: Chay ZAP FULL SCAN (Docker)
        run: |
          docker run --rm -v $(pwd):/zap/wrk/:rw -u 0 -t zaproxy/zap-stable zap-full-scan.py \
            -t https://demo.owasp-juice.shop/ \
            -r report.html || true

      # 3. LOGIC KILL-SWITCH (Đã gia cố để không bị exit code 1)
      - name: Kich hoat phan ung tu dong
        if: always()
        run: |
          # 1. Mặc định là trang an toàn (Lấy từ file hoặc tạo mới nếu mất file)
          if [ -f normal.html ]; then
            cp normal.html index.html
          else
            echo "<html><body style='text-align:center;padding-top:20%;'><h1>Hệ thống đang hoạt động bình thường</h1></body></html>" > index.html
          fi
          
          # 2. Kiểm tra nếu có lỗi High thì "ép" sang giao diện Đen Đỏ
          if grep -i -q "High" report.html; then
            echo "--- PHÁT HIỆN LỖI HIGH! KÍCH HOẠT KILL SWITCH ---"
            if [ -f attack.html ]; then
              cp attack.html index.html
            else
              # Trường hợp mất file attack.html, tự tạo code CSS ngay tại chỗ cho ngầu
              echo "<html><body style='background:black;color:red;text-align:center;padding-top:15%;font-family:monospace;'><h1>[ SYSTEM UNDER ATTACK ]</h1><p>Detected High Vulnerabilities by DevSecOps Pipeline</p></body></html>" > index.html
            fi
          fi

      # 4. Đẩy kết quả lên GitHub (Thêm dấu || true để không bị lỗi nếu không có gì thay đổi)
      - name: Tu dong day len Github
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "DevSecOps: Auto-response and Report update"
          file_pattern: 'index.html 02_Ket_qua_quet/*.html report.html'
          push_options: '--force'