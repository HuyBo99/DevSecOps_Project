name: DevSecOps Final Kill-Switch

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # Job này sẽ quét bảo mật và tạo file index.html
  security_scan_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Chạy ZAP Full Scan
      - name: Chay ZAP FULL SCAN
        run: |
          touch report.html
          chmod 777 report.html
          docker run --rm -v $(pwd):/zap/wrk/:rw -u 0 -t zaproxy/zap-stable zap-full-scan.py \
            -t https://demo.owasp-juice.shop/ \
            -r report.html || true

      # 2. Tạo giao diện dựa trên kết quả quét
      - name: Create index.html
        run: |
          if [ -f report.html ] && grep -i -q "High" report.html; then
            if [ -f attack.html ]; then cp attack.html index.html; else echo "<h1>SYSTEM UNDER ATTACK</h1>" > index.html; fi
          else
            if [ -f normal.html ]; then cp normal.html index.html; else echo "<h1>System Safe</h1>" > index.html; fi
          fi
          touch .nojekyll

      # 3. Nén file để đẩy lên
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # 4. Đẩy thẳng lên Web (Cái bước bị lỗi lúc nãy)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4