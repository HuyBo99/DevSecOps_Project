name: DevSecOps Final Kill-Switch

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  security_scan_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Chạy ZAP Full Scan
      - name: Chay ZAP FULL SCAN
        run: |
          touch report.html
          chmod 777 report.html
          docker run --rm -v $(pwd):/zap/wrk/:rw -u 0 -t zaproxy/zap-stable zap-full-scan.py \
            -t https://demo.owasp-juice.shop/ \
            -r report.html || true

      # 2. LOGIC QUYẾT ĐỊNH (Không bao giờ để index.html trống)
      - name: Create index.html based on security status
        run: |
          if [ -f report.html ] && grep -i -q "High" report.html; then
            echo "PHAT HIEN LOI HIGH - KICH HOAT KILL SWITCH"
            # Ưu tiên dùng file attack.html của ông, nếu không có thì tự tạo code xịn
            if [ -f attack.html ]; then
              cp attack.html index.html
            else
              echo "<html><body style='background:black;color:red;text-align:center;padding-top:15%;font-family:monospace;'><h1>[ SYSTEM UNDER ATTACK ]</h1><p>High Vulnerabilities Detected</p></body></html>" > index.html
            fi
          else
            echo "He thong an toan"
            if [ -f normal.html ]; then
              cp normal.html index.html
            else
              echo "<html><body style='text-align:center;padding-top:20%;'><h1>System Running Safely</h1></body></html>" > index.html
            fi
          fi
          # Tạo file .nojekyll để chắc chắn hiển thị
          touch .nojekyll

      # 3. TRIỂN KHAI THẲNG LÊN WEB (Bỏ qua bước commit rườm rà)
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4