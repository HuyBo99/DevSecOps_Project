name: OWASP ZAP Security Scan

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Quet bao mat Web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Chuan bi file bao cao
        run: |
          # Tạo sẵn file rỗng và cấp quyền tối đa để Docker ghi vào được
          touch report.html
          chmod 777 report.html

      - name: Chay ZAP Scan (Docker)
        run: |
          # Chạy với UID của root (0) để ép ghi file
          docker run --rm -v $(pwd):/zap/wrk/:rw -u 0 -t zaproxy/zap-stable zap-baseline.py \
            -t https://demo.owasp-juice.shop/ \
            -r report.html || true

      - name: Kiem tra va Luu bao cao
        if: always()
        run: |
          mkdir -p 02_Ket_qua_quet
          # Kiểm tra nếu file có nội dung (> 0 bytes)
          if [ -s report.html ]; then
            cp report.html 02_Ket_qua_quet/report_$(date +'%H%M').html
            echo "--- DA CO FILE BAO CAO ---"
          else
            echo "--- FILE VAN RONG - TAO FILE LOI DE THEO DOI ---"
            echo "<html><body><h1>ZAP không quet duoc link nay. Kiem tra Logs buoc tren!</h1></body></html>" > 02_Ket_qua_quet/error_log.html
          fi

      - name: Tu dong day len Github
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Final Fix: Da co bao cao bao mat #${{ github.run_number }}"
          file_pattern: '02_Ket_qua_quet/*.html'