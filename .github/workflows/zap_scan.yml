name: OWASP ZAP Security Scan

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Cái này để ông có nút "Run" trên GitHub để test cho nhanh

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Quét lỗ hổng bảo mật Web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://juice-shop.herokuapp.com/'
          artifact_name: 'zap_report'

      # Bước này cực kỳ quan trọng để lưu vào thư mục 02_Ket_qua_quet
      - name: Upload Scan Report to Repo
        if: always()
        run: |
          mkdir -p 02_Ket_qua_quet
          cp zap_report.html 02_Ket_qua_quet/report_$(date +'%Y%m%d').html
          
      - name: Commit and Push report
        if: always()
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add 02_Ket_qua_quet/*.html
          git commit -m "Auto-update: Kết quả quét bảo mật $(date +'%Y-%m-%d')" || exit 0
          git push