name: OWASP ZAP Security Scan

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write # Quyền ghi vào Repo

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Quét lỗ hổng bảo mật Web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://juice-shop.herokuapp.com/'
          artifact_name: 'zap_report'
          fail_action: false

      - name: Di chuyển báo cáo vào thư mục
        if: always()
        run: |
          mkdir -p 02_Ket_qua_quet
          # Kiểm tra nếu file tồn tại mới copy
          if [ -f "zap_report.html" ]; then
            cp zap_report.html 02_Ket_qua_quet/report_$(date +'%Y%m%d_%H%M').html
          fi

      # CHIÊU CUỐI: Dùng Action chuyên dụng để đẩy code (Bypass lỗi 128)
      - name: Auto Commit and Push
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Báo cáo bảo mật ${{ github.run_id }}"
          file_pattern: '02_Ket_qua_quet/*.html'